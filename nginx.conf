http {
  include mime.types;
  set_real_ip_from        0.0.0.0/0;
  real_ip_recursive       on;
  real_ip_header          X-Forward-For;
  limit_req_zone          $binary_remote_addr zone=mylimit:10m rate=10r/s;

server {
    listen 80;
    server_name www.lccoordinator.com;
    return 301 https://$host$request_uri;
}

  server {
    listen 443;
    server_name www.lccoordinator.com;

    ssl_certificate /etc/letsencrypt/live/www.lccoordinator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.lccoordinator.com/privkey.pem;
   # include /etc/nginx/snippets/ssl-params.conf;
    
    root /usr/share/nginx/html;
    limit_req zone=mylimit burst=70 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        # proxy_pass http://localhost:2210; 
    }
    

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
  }
}

events {}
